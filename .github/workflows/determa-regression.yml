name: DETERMA Replay Regression

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  replay-regression:
    name: Replay Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run replay regression
        env:
          PYTHONPATH: .
        run: |
          python -m src.determa_replay.corpus_runner --no-write
