task_id: PR-XXX
name: short-task-name
priority: high

objective: >
  One clear measurable outcome.

scope:
  allowed_files:
    - src/**
    - tests/**

  forbidden_files:
    - package-lock.json
    - pnpm-lock.yaml
    - infra/**

allowed_actions:
  - add_tests
  - update_docs
  - modify_existing_code

forbidden_actions:
  - add_dependencies
  - change_architecture
  - modify_auth_logic
  - bypass_tests

inputs:
  - replay_engine
  - existing_rules

expected_output:
  - working_feature
  - passing_tests
  - replay_output_example

tests_required:
  - unit
  - replay_regression

acceptance_criteria:
  - replay renders correctly
  - tests pass
  - no unrelated file changes
  - output matches replay format

verification:
  replay_required: true
  human_review_required: true

rollback:
  reversible: true
  rollback_strategy: git revert
